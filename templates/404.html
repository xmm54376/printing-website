{% extends "base.html" %}
{% block title %}页面未找到 - {{ cfg.site_name }}{% endblock %}

{% block extra_head %}
<style>
.error-page {
  min-height: calc(100vh - 120px);
  display: flex; align-items: center; justify-content: center;
  padding: 40px 16px; background: #f7f8fa;
}
.error-card {
  text-align: center; max-width: 480px;
}
.error-code {
  font-size: 8rem; font-weight: 900; color: var(--primary);
  line-height: 1; opacity: .15;
}
.error-icon { font-size: 4rem; margin-bottom: 16px; }
.error-title {
  font-size: 1.8rem; font-weight: 800; color: var(--secondary);
  margin-bottom: 12px; margin-top: -40px; position: relative;
}
.error-desc { font-size: .95rem; color: var(--text-muted); margin-bottom: 32px; line-height: 1.7; }
.error-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
@media (max-width: 480px) {
  .error-code { font-size: 5rem; }
  .error-title { font-size: 1.4rem; }
}
</style>
{% endblock %}

{% block body %}
<div class="error-page">
  <div class="error-card">
    <div class="error-code">404</div>
    <div class="error-icon">🔍</div>
    <h1 class="error-title">页面未找到</h1>
    <p class="error-desc">
      抱歉，您访问的页面不存在或已被移除。<br>
      请检查网址是否正确，或返回首页浏览。
    </p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">返回首页</a>
      <a href="/contact" class="btn btn-outline">联系我们</a>
    </div>
  </div>
</div>
{% endblock %}
